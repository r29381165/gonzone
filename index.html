<!DOCTYPE html>
<html lang="zh-TW">
<head><meta charset="UTF-8"><title>台股題材總覽</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Anthropic Sans",system-ui,sans-serif;background:var(--color-background-primary,#fff);color:var(--color-text-primary,#1a1a18)}
:root{
  --bg1:#fff;--bg2:#f5f4f0;--bg3:#eeecea;
  --t1:#1a1a18;--t2:#5a5a56;--t3:#8a8a84;
  --b1:rgba(0,0,0,.12);--b2:rgba(0,0,0,.22);
  --radius:8px;--radius-lg:12px;
  --purple-50:#EEEDFE;--purple-800:#3C3489;
  --teal-50:#E1F5EE;--teal-800:#085041;
  --amber-50:#FAEEDA;--amber-800:#633806;
  --blue-50:#E6F1FB;--blue-800:#0C447C;
  --coral-50:#FAECE7;--coral-800:#712B13;
  --green-50:#EAF3DE;--green-800:#27500A;
  --pink-50:#FBEAF0;--pink-800:#72243E;
}
@media(prefers-color-scheme:dark){
  :root{--bg1:#1c1c1a;--bg2:#242422;--bg3:#2c2c2a;--t1:#e8e6df;--t2:#a8a69f;--t3:#68675f;--b1:rgba(255,255,255,.1);--b2:rgba(255,255,255,.18)}
  .d0 .chip{background:#26215C;color:#CECBF6}
  .d1 .chip{background:#04342C;color:#9FE1CB}
  .d2 .chip{background:#412402;color:#FAC775}
  .d3 .chip{background:#042C53;color:#B5D4F4}
  .d4 .chip{background:#4A1B0C;color:#F5C4B3}
  .ptag.cn{background:#04342C;color:#9FE1CB}
  .ptag.global{background:#26215C;color:#CECBF6}
  .ptag.tw{background:#042C53;color:#B5D4F4}
  .pcard{background:var(--bg3)}
  .ask-btn{color:var(--t2);border-color:var(--b1)}
  .ask-btn:hover{background:var(--bg3)}
}
#wrap{display:flex;gap:0;min-height:600px}
#left{width:50%;border-right:0.5px solid var(--b1);padding:10px 6px 16px 10px;overflow-y:auto;max-height:700px}
#right{width:50%;overflow-y:auto;max-height:700px;background:var(--bg1)}
#search-row{display:flex;gap:6px;margin-bottom:8px}
#search{flex:1;padding:6px 10px;border:0.5px solid var(--b1);border-radius:var(--radius);background:var(--bg2);color:var(--t1);font-size:12px;outline:none}
.tree{list-style:none;padding:0}
.tree li{position:relative}
.nr{display:flex;align-items:center;gap:4px;padding:2px 4px;border-radius:5px;cursor:pointer;user-select:none}
.nr:hover{background:var(--bg2)}
.nr.active{background:#E6F1FB}
@media(prefers-color-scheme:dark){.nr.active{background:#042C53}}
.ar{font-size:9px;color:var(--t3);width:10px;flex-shrink:0;transition:transform .15s}
.ar.open{transform:rotate(90deg)}
.ar.lf{opacity:0;pointer-events:none}
.chip{display:inline-flex;align-items:center;padding:1px 8px;border-radius:20px;font-size:11.5px;font-weight:500;line-height:1.75}
.has-info .chip{cursor:pointer;text-decoration:underline dotted;text-underline-offset:2px}
.ch{list-style:none;padding-left:14px;border-left:0.5px solid var(--b1);margin-left:7px}
.hidden{display:none}
.hl{background:#FAC775;color:#412402;border-radius:2px}
.d0 .chip{background:#EEEDFE;color:#3C3489}
.d1 .chip{background:#E1F5EE;color:#085041}
.d2 .chip{background:#FAEEDA;color:#633806}
.d3 .chip{background:#E6F1FB;color:#0C447C}
.d4 .chip{background:#FAECE7;color:#712B13}
#panel{padding:14px 14px 24px;display:none}
#panel.show{display:block}
#panel-empty{padding:50px 16px;color:var(--t3);font-size:13px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:8px}
.ptag{display:inline-block;font-size:11px;padding:1px 7px;border-radius:20px;margin:2px 2px 2px 0;font-weight:500}
.ptag.cn{background:#E1F5EE;color:#085041}
.ptag.global{background:#EEEDFE;color:#3C3489}
.ptag.tw{background:#E6F1FB;color:#0C447C}
.section{margin-bottom:13px}
.slabel{font-size:10.5px;font-weight:500;color:var(--t3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.body{font-size:12.5px;color:var(--t2);line-height:1.75}
.pcard{background:var(--bg2);border-radius:var(--radius);padding:7px 9px;margin-bottom:5px}
.pname{font-size:12.5px;font-weight:500;color:var(--t1)}
.pdesc{font-size:11.5px;color:var(--t2);margin-top:2px;line-height:1.55}
.ask-btn{margin-top:10px;padding:6px 12px;font-size:12px;border:0.5px solid var(--b2);border-radius:var(--radius);background:transparent;color:var(--t2);cursor:pointer;width:100%;text-align:left}
.ask-btn:hover{background:var(--bg2)}
.phead{font-size:15px;font-weight:500;color:var(--t1);margin-bottom:8px;padding-bottom:7px;border-bottom:0.5px solid var(--b1)}
.hint{font-size:11px;color:var(--t3);flex-shrink:0}
</style>
</head><body>
<div id="wrap">
<div id="left">
  <div id="search-row">
    <input id="search" placeholder="搜尋題材…" oninput="doSearch(this.value)">
    <span class="hint">底線節點可查詳情</span>
  </div>
  <ul id="tree" class="tree"></ul>
</div>
<div id="right">
  <div id="panel-empty">
    <span style="font-size:28px;opacity:.3">☰</span>
    <span>點擊左側底線題材<br>查看詳細介紹</span>
  </div>
  <div id="panel"></div>
</div>
</div>

<script>
const INFO={

// ── 記憶體 ──────────────────────────────────────────────
hbm:{title:"HBM 高頻寬記憶體",
tags:[{t:"AI核心",c:"global"},{t:"記憶體",c:"cn"}],
what:"HBM（High Bandwidth Memory）將多顆 DRAM Die 垂直堆疊，透過矽穿孔（TSV）互連，頻寬可達 1.2 TB/s（HBM3E），是 AI GPU/HPC 的標配記憶體。與 GPU 並排在同一 CoWoS 基板，省去 PCB 傳輸延遲，功耗遠低於 GDDR。",
players:[
{name:"SK 海力士",tag:"global",desc:"全球市佔第一（~50%）。HBM3E 12-High 率先量產，MR-MUF 底部填充技術改善散熱與良率；與 NVIDIA H100/H200/B200 深度綁定。"},
{name:"三星",tag:"global",desc:"市佔約 30%。HBM3E 良率 2024 年加速追趕，12nm 製程有成本優勢，但 AI 客戶認證進度慢於 SK 海力士。"},
{name:"美光",tag:"global",desc:"市佔約 20%。1β nm 製程功耗優勢顯著，HBM3E 量產稍晚，積極爭取 NVIDIA GB200/GB300 份額。"},
],
tw:"CoWoS 封裝（TSMC）；測試：京元電（2449）、欣銓（3264）；載板：南電（8046）、景碩（3189）。台灣無自製 HBM，但封測供應鏈受益明顯。",
ask:"HBM 供應鏈台灣哪些公司最直接受益"},

hbm2e:{title:"HBM2E",
tags:[{t:"記憶體",c:"cn"},{t:"前世代",c:"global"}],
what:"HBM 第二代增強版（2020-2022 年主流），頻寬 460 GB/s，用於 NVIDIA A100、AMD MI100。目前已逐步被 HBM3 取代，價格下滑，仍用於部分邊緣 AI 與科研 HPC。",
players:[
{name:"SK 海力士",tag:"global",desc:"HBM2E 最大供應商，供應 NVIDIA A100 系列。"},
{name:"三星",tag:"global",desc:"A100 替代供應，也用於 Google TPU v4。"},
{name:"美光",tag:"global",desc:"HBM2E 量產規模較小，主攻伺服器 DRAM 市場。"},
],
tw:"HBM2E 封裝測試由日月光、矽品協助，但規模已縮減；聚焦觀察 HBM3E/HBM4 接班時程。",
ask:"HBM2E 到 HBM4 的世代演進與廠商消長"},

hbm3:{title:"HBM3",
tags:[{t:"記憶體",c:"cn"},{t:"2023主力",c:"global"}],
what:"HBM 第三代，頻寬 819 GB/s，用於 NVIDIA H100。Stack 高度 8-High 為主，容量 24GB/Stack。2023 年為 AI 爆發的核心記憶體規格，HBM3E（增強版）為其進化型。",
players:[
{name:"SK 海力士",tag:"global",desc:"H100 獨家供應商（初期），HBM3 市佔超過 60%，技術與量產都最領先。"},
{name:"三星",tag:"global",desc:"HBM3 良率問題曾導致 NVIDIA 認證遲滯，2024 年才逐步放量。"},
{name:"美光",tag:"global",desc:"HBM3 量產規模有限，主力放在 HBM3E。"},
],
tw:"TSMC CoWoS-S 為 H100 HBM3 封裝主力；日月光投控（3711）為後段封裝受益。",
ask:"HBM3 和 HBM3E 的技術差距與換代節奏"},

hbm3e:{title:"HBM3E",
tags:[{t:"記憶體",c:"cn"},{t:"2024-2025主力",c:"global"}],
what:"HBM3E 是 HBM3 的增強版，頻寬提升至 1.2 TB/s，12-High Stack 容量達 36GB/Stack。是 NVIDIA H200、B100/B200 的核心記憶體，也是 2024-2026 年 AI 訓練叢集的主流規格。",
players:[
{name:"SK 海力士",tag:"global",desc:"HBM3E 量產最早（2024 Q1），H200/B200 主力供應商。MR-MUF 技術使 12-High 良率顯著優於競品。"},
{name:"三星",tag:"global",desc:"HBM3E 12nm 製程成本有優勢，但 NVIDIA 認證延遲，現積極切入 AMD MI350 供應。"},
{name:"美光",tag:"global",desc:"1β nm 製程 HBM3E 功耗最低，H200 NVL 有少量份額，持續提升。"},
],
tw:"CoWoS-L（TSMC）為 B200/B100 HBM3E 封裝方案；南電（8046）ABF 載板、景碩（3189）載板受益。",
ask:"HBM3E 12-High 與 8-High 的差異"},

hbm4:{title:"HBM4（下一世代）",
tags:[{t:"記憶體",c:"cn"},{t:"2026+",c:"global"}],
what:"HBM4 目標頻寬 2+ TB/s，採用邏輯晶片（Logic Die）作為底層 Base Die，支援 CXL/AXI 介面，靈活度大幅提升。三大廠均計畫 2025-2026 年量產，供應 NVIDIA GB300/B300 與下一代 AMD GPU。",
players:[
{name:"SK 海力士",tag:"global",desc:"HBM4 標準制定主導廠商，計畫 2025 年下半年送樣，2026 年量產。"},
{name:"三星",tag:"global",desc:"HBM4 與 TSMC 合作 Base Die 封裝，若良率達標可望扳回一城。"},
{name:"美光",tag:"global",desc:"HBM4 計畫最低調，但 1γ nm 製程若如期推出將有功耗優勢。"},
],
tw:"HBM4 Base Die 可能交由 TSMC 代工，封裝複雜度更高，CoWoS 與先進封裝需求進一步擴大。",
ask:"HBM4 和 HBM3E 的架構差異"},

dram:{title:"DRAM",
tags:[{t:"記憶體",c:"cn"},{t:"AI伺服器",c:"global"}],
what:"DRAM 是主要揮發性記憶體，AI 伺服器每台需配置 TB 級 DDR5（8-12 個 DIMM），行動裝置使用 LPDDR5X。AI 浪潮推動伺服器 DRAM ASP 大幅提升。三大廠（三星、SK 海力士、美光）合計市佔超 95%。",
players:[
{name:"三星",tag:"global",desc:"全球市佔約 40%，1z/1α nm 量產中，DDR5 與 LPDDR6 為下一競爭場域。"},
{name:"SK 海力士",tag:"global",desc:"市佔約 30%，AI 伺服器 DDR5 需求受惠，HBM 成功帶動整體溢價。"},
{name:"美光",tag:"global",desc:"市佔約 25%，1β nm 製程功耗優勢，積極爭取 AI 伺服器標配份額。"},
{name:"南亞科 (2408)",tag:"tw",desc:"台灣唯一 DRAM 自製廠，DDR4/DDR5 為主，跟漲週期型態明顯，規模與三大廠差距大。"},
],
tw:"南亞科（2408）直接受益；力積電（6770）承接 DRAM 代工訂單（iDRAM）；威剛（3260）為 DRAM 模組廠。",
ask:"南亞科在 DRAM 產業週期的投資邏輯"},

nor:{title:"NOR Flash",
tags:[{t:"記憶體",c:"cn"},{t:"車用/工控",c:"global"}],
what:"NOR Flash 支援就地執行（XIP），MCU/SoC 可直接從中執行韌體，廣泛用於車用 ECU、工控、IoT。容量小（MB 級）但讀取速度快、穩定性高，是安全關鍵系統首選。車用 NOR 需通過 AEC-Q100 認證，高門檻造就強護城河。",
players:[
{name:"旺宏 (MX, 2337)",tag:"tw",desc:"全球 NOR 龍頭，SLC/MLC 市佔第一。Cypress 退出部分市場後定價力提升，車用 NOR 為主要成長動能，股息殖利率是市場關注重點。"},
{name:"華邦電 (2344)",tag:"tw",desc:"全球 NOR 市佔第二，W25 系列廣泛應用消費與工控。DDR3 DRAM 亦為其重要業務，雙引擎布局。"},
{name:"Infineon (Cypress)",tag:"global",desc:"歐美車用 NOR 高可靠度產品為主，已縮減消費性市場，專注車用高階規格。"},
],
tw:"旺宏（2337）、華邦電（2344）為台灣直接標的。觀察車用 NOR ASP 趨勢、旺宏現金股利政策與良率改善進度。",
ask:"旺宏 NOR Flash 的護城河與估值邏輯"},

nand:{title:"NAND Flash",
tags:[{t:"記憶體",c:"cn"},{t:"SSD",c:"global"}],
what:"NAND Flash 為主流非揮發性儲存，依每 Cell 儲存位元：SLC（1bit）、MLC（2bit）、TLC（3bit 主流）、QLC（4bit）。AI 資料中心部署帶動高 TBW SSD 需求爆發。3D NAND 堆疊層數持續提升（目前最高 300+ 層）。",
players:[
{name:"三星",tag:"global",desc:"市佔約 30%，V-NAND 第九代已量產，QLC SSD 積極推進資料中心市場。"},
{name:"SK 海力士 (Solidigm)",tag:"global",desc:"收購 Intel NAND 事業後市佔約 20%，企業級 SSD 競爭力提升。"},
{name:"Kioxia / WD",tag:"global",desc:"合資晶圓廠，BiCS NAND 持續推進，市佔合計約 30%。"},
{name:"美光",tag:"global",desc:"232 層 TLC NAND 量產，資料中心 SSD（Micron 9400）積極擴張。"},
],
tw:"SSD 控制器：慧榮（8299）、群聯（8284）；測試：京元電（2449）；設備：辛耘（3583）。旺宏（2337）有利基型 SLC NAND 產品。",
ask:"AI 資料中心 SSD 需求對 NAND 廠的影響"},

// ── 封裝 ──────────────────────────────────────────────
cowos:{title:"CoWoS 先進封裝",
tags:[{t:"TSMC獨有",c:"tw"},{t:"AI封裝核心",c:"global"}],
what:"CoWoS（Chip on Wafer on Substrate）是 TSMC 研發的 2.5D 封裝，將 GPU Die 與 HBM 並排在中介層上，提供超高頻寬互連。AI GPU（H100/B200/MI300X）全數依賴 CoWoS。TSMC 持續擴充產能至 2026 年，中介層面積不斷放大。",
players:[
{name:"TSMC",tag:"tw",desc:"全球唯一大規模量產 CoWoS 廠。CoWoS-S/L/R 三路並進，每月產能從 2023 年約 1 萬片擴充至 2025 年底預計 3+ 萬片。"},
{name:"日月光 (3711)",tag:"tw",desc:"TSMC CoWoS 轉包夥伴，承接後段 Substrate 組裝與測試，為 AI 封裝最大受益台廠。"},
{name:"矽品 (2325)",tag:"tw",desc:"日月光旗下，承接 CoWoS 後段相關工序。"},
],
tw:"日月光投控（3711）、矽品（2325）、南電（8046，ABF 載板）、景碩（3189，載板）、京元電（2449，測試）、欣銓（3264，測試）。",
ask:"CoWoS 產能瓶頸與台灣封測股的受益程度"},

cowos_s:{title:"CoWoS-S（Silicon Interposer）",
tags:[{t:"2.5D封裝",c:"global"},{t:"H100/H200主力",c:"tw"}],
what:"CoWoS-S 使用「矽中介層（Silicon Interposer）」連接 GPU Die 與 HBM，是最成熟的 CoWoS 形式。矽中介層提供最高密度的互連線路（線寬 <1μm），訊號完整性最佳。缺點是矽中介層製造成本高、尺寸受限於矽晶圓大小（最大約 800mm²），不易做大。",
players:[
{name:"TSMC",tag:"tw",desc:"CoWoS-S 量產最早（2016 年），供應 NVIDIA H100/H200 所有 HBM3/3E 版本。產能最穩定，也是目前出貨量最大的 CoWoS 形式。"},
{name:"日月光 (3711)",tag:"tw",desc:"後段 BGA 基板組裝，協助 TSMC 後段封裝轉包。"},
],
tw:"CoWoS-S 供應鏈台股：日月光（3711）、南電（8046）、景碩（3189）。目前 H100/H200 每顆 GPU 使用 6 顆 HBM3E，全部走 CoWoS-S 封裝。",
ask:"CoWoS-S 和 CoWoS-L 的技術差異與適用場景"},

cowos_l:{title:"CoWoS-L（Local Si Interposer）",
tags:[{t:"2.5D封裝",c:"global"},{t:"B200/GB200主力",c:"tw"}],
what:"CoWoS-L 在矽中介層基礎上加入「RDL（重佈線層）」橋接多個區塊，突破單一矽中介層的面積限制，可支援更大封裝尺寸（>1000mm²）。B200/GB200 Super 的 8 顆 HBM3E 配置需要更大面積，正是 CoWoS-L 的用武之地。成本高於 CoWoS-S，良率挑戰也更大。",
players:[
{name:"TSMC",tag:"tw",desc:"CoWoS-L 從 2024 年 H2 開始放量，主要供應 NVIDIA B200/B100 及 GB200 伺服器模組。2025 年成為產能擴充重點。"},
{name:"日月光 (3711)",tag:"tw",desc:"CoWoS-L 後段基板組裝，受益 B200 出貨放量。"},
],
tw:"CoWoS-L 封裝需要更大 ABF 基板，南電（8046）受益更深；封裝良率挑戰使 TSMC 良率管理格外關鍵，景碩（3189）亦是供應商之一。",
ask:"為什麼 B200 要從 CoWoS-S 升級到 CoWoS-L"},

cowos_r:{title:"CoWoS-R（RDL Interposer）",
tags:[{t:"2.5D封裝",c:"global"},{t:"成本優化路線",c:"tw"}],
what:"CoWoS-R 完全捨棄矽中介層，改用 RDL（Redistribution Layer，即 Fan-Out 技術）作為互連層，材料成本更低，且面板級製造（FOPLP）兼容性高。互連密度低於 CoWoS-S/L，但對於部分不需最高頻寬的 ASIC 晶片（如 Google TPU、Amazon Trainium）性價比更高。",
players:[
{name:"TSMC",tag:"tw",desc:"CoWoS-R 為滿足 CSP（雲端客戶）自研 ASIC 需求而開發，預計 2025-2026 年量產。"},
{name:"日月光 (3711)",tag:"tw",desc:"CoWoS-R 與 Fan-Out 技術相近，日月光 FOCoS 技術形成競爭關係。"},
{name:"三星 / Amkor",tag:"global",desc:"提供類似 RDL Interposer 封裝方案，與 TSMC CoWoS-R 競爭 ASIC 客戶。"},
],
tw:"CoWoS-R 量產後若搶下 Google/Amazon ASIC 訂單，對 PCB 載板廠（南電、景碩）與測試廠（欣銓、京元電）均有正面效益。",
ask:"CoWoS-R 與 FOPLP 的技術路線是否會整合"},

foplp:{title:"FOPLP / 玻璃載板 TGV",
tags:[{t:"下世代封裝",c:"global"},{t:"2027-2028量產",c:"tw"}],
what:"FOPLP（Fan-Out Panel Level Packaging）將封裝載體從圓形晶圓改為矩形大面板（510×515mm），提高面積利用率、降低成本。玻璃載板（Glass Substrate）利用 TGV（Through-Glass Via）取代 ABF 載板，具更佳訊號完整性與翹曲控制。市場共識：Intel 需求最確定，量產在 2026-2028 年；TSMC CoPoS 在 2028+ 年。",
players:[
{name:"Intel",tag:"global",desc:"最積極推動玻璃載板的廠商，目標 2026-2027 年在 CPU/GPU 導入，為近期最確定需求來源。"},
{name:"TSMC",tag:"tw",desc:"CoPoS（Chip on Panel on Substrate）開發中，預計 2028-2029 年量產，仍屬中長期。"},
{name:"鈦昇 (8027)",tag:"tw",desc:"TGV 雷射鑽孔設備廠，玻璃載板製程最關鍵設備之一，是市場最純粹的受益標的。"},
{name:"東捷 (8064)",tag:"tw",desc:"玻璃基板切割、搬運設備，FOPLP 量產不可或缺的設備廠。"},
{name:"雷科 (6207)",tag:"tw",desc:"雷射加工設備，可切入 FOPLP/玻璃載板雷射製程設備供應。"},
],
tw:"設備端：鈦昇（8027）、東捷（8064）、雷科（6207）。面板廠切入：群創（3481）布局 FOPLP 面板。時程風險高，建議以 Intel 採購進度作為觀察指標。",
ask:"玻璃載板 TGV 的量產進度與台股主要受益標的"},

soic:{title:"SoIC 系統整合晶片",
tags:[{t:"3D堆疊",c:"tw"},{t:"TSMC自有技術",c:"tw"}],
what:"SoIC（System on Integrated Chips）是 TSMC 的 3D IC 技術，直接將兩顆 Die 面對面（Face-to-Face）或背對正（Face-to-Back）堆疊，互連密度遠高於 CoWoS（可達每 mm² 數千個連接點）。主要用於邏輯晶片與記憶體的極高速整合，如 TSMC 內部測試的 AI 晶片架構。",
players:[
{name:"TSMC",tag:"tw",desc:"SoIC 自研技術，有 SoIC-XS（極小 bump pitch）與 SoIC-X（標準）兩個版本，目前以小量客制化為主，廣泛量產仍在推進中。"},
],
tw:"SoIC 目前仍屬少量客制，台股尚無直接純標的；對 TSMC 本身有長期差異化意義，可搭配 CoWoS 題材一起觀察。",
ask:"SoIC 和 CoWoS 在 3D 封裝路線上的差異"},

// ── 設備 ──────────────────────────────────────────────
euv:{title:"EUV 極紫外光微影",
tags:[{t:"先進製程關鍵",c:"global"},{t:"ASML壟斷",c:"global"}],
what:"EUV（Extreme Ultraviolet）使用 13.5nm 波長，是 7nm 以下先進製程的必要設備，每台造價超 1.5 億美元。High-NA EUV（0.55 NA）為次世代，可支援 2nm 以下，目前 Intel 已收到首批 High-NA 機台。全球唯 ASML 可生產，形成絕對壟斷。",
players:[
{name:"ASML",tag:"global",desc:"全球唯一 EUV 設備商，High-NA EUV 已交付 Intel，TSMC/三星 High-NA 規劃中。受美中科技戰影響，禁止對中國出口 EUV 設備。"},
{name:"家登 (3680)",tag:"tw",desc:"EUV 光罩傳送盒（FOUP/SMIF Pod）台灣龍頭，也跨入 EUV 光罩盒，為台股最純粹的 EUV 受益標的。"},
{name:"弘塑 (3131)",tag:"tw",desc:"半導體濕製程設備，EUV 相關晶圓清洗耗材設備供應商。"},
],
tw:"家登（3680）是台股 EUV 最佳標的，光罩盒進入 TSMC/三星供應鏈；崇越（5434）代理半導體材料；漢微科為光罩廠。",
ask:"家登在 EUV 光罩盒的競爭地位與護城河"},

aoi:{title:"AOI / 半導體檢測設備",
tags:[{t:"設備",c:"global"},{t:"良率管理",c:"global"}],
what:"AOI（Automated Optical Inspection）是晶圓製造不可或缺的良率管理工具，透過光學系統掃描晶圓表面缺陷。先進製程每增加一層 EUV，就需要更多 AOI 檢測步驟，帶動設備需求持續增長。",
players:[
{name:"KLA (美)",tag:"global",desc:"全球半導體缺陷檢測設備龍頭，市佔超 50%，技術壟斷力強。"},
{name:"AMAT (Applied Materials)",tag:"global",desc:"晶圓製造設備全線供應，AOI 為其次要業務。"},
{name:"旭東機械 (旭東,台)",tag:"tw",desc:"IC 封裝後段 AOI 設備，切入 CoWoS/先進封裝視覺檢測。"},
],
tw:"台股 AOI 相關：旭東機械、精測電子（6510，探針卡與測試介面）、台灣日立（高真空設備）。前道 AOI 仍以 KLA 等外資為主，台廠在後段封裝 AOI 有切入機會。",
ask:"半導體 AOI 設備市場的台灣機會"},

probe:{title:"探針卡 / 半導體測試",
tags:[{t:"設備",c:"global"},{t:"測試",c:"global"}],
what:"探針卡（Probe Card）用於晶圓測試階段，在封裝前對每顆 Die 進行電性測試。先進製程與 HBM 測試複雜度提升，帶動高階探針卡（MEMS、垂直式）需求。",
players:[
{name:"FormFactor (美)",tag:"global",desc:"全球探針卡龍頭，MEMS 探針卡市佔最高，供應 TSMC/三星測試線。"},
{name:"精測電子 (6510)",tag:"tw",desc:"台灣最大探針卡廠，切入先進製程與 HBM 測試探針卡，為台股直接標的。"},
{name:"旺矽 (6223)",tag:"tw",desc:"探針卡與測試介面，聚焦中高階市場。"},
],
tw:"精測電子（6510）、旺矽（6223）為台股直接標的；後段測試廠：京元電（2449）、欣銓（3264）、矽格（6257）。",
ask:"精測電子在 HBM 探針卡市場的機會"},

// ── IC 設計 ──────────────────────────────────────────────
pmic:{title:"PMIC 電源管理 IC",
tags:[{t:"IC設計",c:"tw"},{t:"AI伺服器",c:"global"}],
what:"PMIC（Power Management IC）負責管理電壓調節、充放電控制、電源序列等功能，是每個電子系統的必備元件。AI 伺服器功耗激增（單顆 GPU 超 700W），對高電流、快速暫態響應的 VR（電壓調節器）和 PWM 控制 IC 需求大幅提升。車用 PMIC 亦受 EV/ADAS 帶動快速成長。",
players:[
{name:"德儀 (TI)",tag:"global",desc:"全球類比與 PMIC 龍頭，伺服器電源管理市佔最高，車用 PMIC 亦是主力。"},
{name:"英飛凌 (Infineon)",tag:"global",desc:"車用 PMIC 與功率元件市佔高，GaN 充電 IC 亦布局。"},
{name:"茂達 (6138)",tag:"tw",desc:"台灣伺服器 PMIC 設計廠，AI 伺服器電源 IC 受益，為台股 PMIC 代表標的。"},
{name:"偉詮電 (2436)",tag:"tw",desc:"Type-C PD 控制器、USB 電源管理 IC，快充生態系受益。"},
{name:"立錡 (6286)",tag:"tw",desc:"快充 IC、電源管理 IC，與偉詮競爭 USB PD 市場。"},
],
tw:"AI 伺服器 PMIC：茂達（6138）、芯科（6451）。快充/Type-C：偉詮電（2436）、立錡（6286）。車用 PMIC：尚無台廠規模量產，以代理為主。",
ask:"AI 伺服器 PMIC 需求爆發的台灣受益股"},

ai_asic:{title:"AI ASIC 自研晶片",
tags:[{t:"IC設計",c:"global"},{t:"去 NVIDIA 化",c:"global"}],
what:"AI ASIC（Application Specific IC）是 Google（TPU）、Amazon（Trainium/Inferentia）、Meta（MTIA）等雲端巨頭自研的 AI 加速器，針對各自工作負載客制優化，性價比優於通用 GPU。TSMC 為主要代工商，台灣封測廠（CoWoS/SoIC）為供應鏈受益方。",
players:[
{name:"Google TPU v5/v6",tag:"global",desc:"訓練與推論並重，採用 CoWoS-R 封裝，TSMC 4nm 製程。"},
{name:"Amazon Trainium 2",tag:"global",desc:"訓練用 ASIC，採用 TSMC 3nm，為 AWS 內部大模型訓練主力。"},
{name:"Meta MTIA 2",tag:"global",desc:"推論 ASIC，聚焦社群推薦系統，功耗效率優先。"},
{name:"台積電",tag:"tw",desc:"全球 AI ASIC 幾乎全部由 TSMC 代工，3nm/2nm 為主力製程節點。"},
],
tw:"TSMC（晶圓代工）、日月光（3711，封裝）、矽品（2325）、欣銓（3264）、京元電（2449）。AI ASIC 成長隱含 TSMC CoWoS 需求放大。",
ask:"AI ASIC 和 NVIDIA GPU 的競爭格局"},

serdes:{title:"SerDes / 高速傳輸 IC",
tags:[{t:"IC設計",c:"tw"},{t:"高速介面",c:"global"}],
what:"SerDes（Serializer/Deserializer）是高速數位介面的核心電路，負責將並列信號轉為串列（以減少走線數）並在接收端還原。廣泛應用於 PCIe 5.0/6.0、CXL、112G/224G 乙太網路。AI 時代資料中心互連速度需求暴增，SerDes IP 與 IC 市場隨之擴大。",
players:[
{name:"博通 (Broadcom)",tag:"global",desc:"高速 SerDes IP 授權與 IC 龍頭，224G SerDes 已量產，供應 AI 資料中心交換器。"},
{name:"Marvell",tag:"global",desc:"112G/224G SerDes IP，整合於 AI 網路 IC 中。"},
{name:"M31 (6643)",tag:"tw",desc:"台灣 SerDes IP 設計公司，授權給 IC 設計廠使用，為台股 SerDes IP 代表。"},
],
tw:"M31（6643）為台灣 IP 公司，提供 SerDes 等高速介面 IP 授權。其他：創意（3443，TSMC 設計服務）可協助客戶整合 SerDes 設計。",
ask:"SerDes 224G 在 AI 資料中心的應用與台股受益"},

wifi7:{title:"WiFi 7 / 無線網路 IC",
tags:[{t:"IC設計",c:"tw"},{t:"消費電子/企業",c:"global"}],
what:"WiFi 7（802.11be）最高速率達 46 Gbps，支援 Multi-Link Operation（MLO），延遲大幅降低，適合 AR/VR、遊戲、企業無線網路。2024 年開始滲透高階路由器與手機，預計 2025-2026 年快速普及。",
players:[
{name:"博通 (Broadcom)",tag:"global",desc:"企業級 WiFi 7 AP 晶片龍頭，供應 Cisco、Aruba 等。"},
{name:"聯發科 (2454)",tag:"tw",desc:"消費級 WiFi 7 路由器晶片市佔最高，Filogic 系列深入中低階路由器市場。"},
{name:"瑞昱 (2379)",tag:"tw",desc:"消費級 WiFi 7 NIC 與路由器晶片，PC 網卡市佔高。"},
],
tw:"聯發科（2454）、瑞昱（2379）為台股主要受益；凌通（4952）切入 WiFi 6E/7 IoT 模組。",
ask:"WiFi 7 滲透率時程與聯發科的市場地位"},

pcie:{title:"PCIe 5.0 / CXL 介面",
tags:[{t:"IC設計",c:"global"},{t:"AI伺服器互連",c:"global"}],
what:"PCIe 5.0 頻寬達 32 GT/s（較 PCIe 4.0 倍增），是 AI 伺服器 GPU/FPGA 連接主機板的主流介面。CXL（Compute Express Link）基於 PCIe 物理層，新增快取一致性協定，允許 CPU 與加速器/記憶體共享快取，是 AI 時代重要的記憶體擴充技術。",
players:[
{name:"Intel",tag:"global",desc:"CXL 規範主要制定者，Xeon 伺服器平台積極推廣 CXL 記憶體擴充。"},
{name:"祥碩 (5269)",tag:"tw",desc:"PCIe/USB 介面 IC 設計，PCIe Switch IC 為台廠中競爭力最強的標的。"},
{name:"譜瑞 (4966)",tag:"tw",desc:"PCIe Retimer、DisplayPort IC，AI 伺服器 PCIe 5.0 訊號整形 IC 受益。"},
],
tw:"祥碩（5269）PCIe Switch、譜瑞（4966）Retimer、威鋒（6289）USB 控制器。AI 伺服器每台需多顆 PCIe Switch/Retimer，需求受惠明顯。",
ask:"祥碩在 PCIe 5.0 市場的競爭地位"},

// ── 光通訊 ──────────────────────────────────────────────
cpo:{title:"CPO 共封裝光學",
tags:[{t:"光通訊",c:"global"},{t:"AI資料中心",c:"global"}],
what:"CPO（Co-Packaged Optics）將光引擎直接封裝在交換器晶片旁，取代傳統插拔式光模組，降低功耗 30-40%、縮短延遲。800G/1.6T 時代因功耗壁壘，CPO 被視為必然趨勢，預計 2025-2027 年進入規模量產。",
players:[
{name:"Intel (光引擎)",tag:"global",desc:"矽光子技術領先，CPO 光引擎主要供應商，與博通交換器 IC 整合。"},
{name:"博通 (Broadcom)",tag:"global",desc:"交換器 ASIC 龍頭，積極推動 CPO 整合至 Tomahawk/Trident 平台。"},
{name:"頎邦 (6147)",tag:"tw",desc:"CPO 光引擎封裝測試，金凸塊（Gold Bump）Flip Chip 為關鍵差異化技術。"},
{name:"南茂 (8150)",tag:"tw",desc:"CPO 封裝測試受益，與頎邦競爭光引擎 Flip Chip 封裝訂單。"},
{name:"光洋科 (1785)",tag:"tw",desc:"光學材料與零組件，切入 CPO 光路材料供應。"},
],
tw:"頎邦（6147）、南茂（8150）封裝直接受益；光洋科（1785）材料端；欣銓（3264）測試端。注意 CPO 量產時程是否如期。",
ask:"CPO 何時會大規模取代可插拔光模組"},

sph:{title:"矽光子 Silicon Photonics",
tags:[{t:"光通訊",c:"global"},{t:"CPO核心技術",c:"global"}],
what:"矽光子利用 CMOS 製程在矽基板上製作光波導、調變器、光偵測器等光學元件，可以與電子電路整合在同一晶片（PIC）。成本低、可大規模量產，是 CPO 光引擎與高速光模組的主流技術路線。相較 InP，矽光子製程與半導體廠相容，但調變效率稍遜。",
players:[
{name:"Intel",tag:"global",desc:"矽光子龍頭，800G 矽光子光模組商業化，CPO 光引擎主力技術。"},
{name:"TSMC",tag:"tw",desc:"提供矽光子晶圓代工（SiPh PDK），客戶包含 Ranovus、Ayar Labs 等新創。"},
{name:"聯亞 (3081)",tag:"tw",desc:"化合物半導體（InP/GaAs），間接競爭矽光子應用市場。"},
],
tw:"TSMC 矽光子代工受益（整體 AI 業務的一部分）；頎邦（6147）、南茂（8150）封裝矽光子 PIC；光鋐（4956）光模組 IC。",
ask:"矽光子和 InP 在高速光通訊的競爭格局"},

tfln:{title:"TFLN 薄膜鈮酸鋰",
tags:[{t:"新型光調變",c:"global"},{t:"1.6T時代",c:"global"}],
what:"TFLN（Thin Film Lithium Niobate）的電光調變頻寬可達 100GHz+，插入損耗極低，遠優於矽光子（~30GHz）。適合 800G/1.6T 超高速光模組的調變器，被視為下一代光通訊骨幹技術。目前產業化仍在早期，晶圓供應是瓶頸。",
players:[
{name:"HyperLight（美）",tag:"global",desc:"TFLN 晶片設計新創，DARPA 支持，調變器技術全球頂尖。"},
{name:"Lumentum / Coherent",tag:"global",desc:"傳統光通訊大廠，積極整合 TFLN 調變器至高速光模組產品線。"},
{name:"SHOWA DENKO（日）",tag:"global",desc:"鈮酸鋰晶圓主要供應商，TFLN 基板材料。"},
],
tw:"台股目前無純 TFLN 標的，屬中期觀察題材。若頎邦（6147）或南茂（8150）切入 TFLN 晶片封裝，為最可能的台廠受益途徑。",
ask:"TFLN 和矽光子的技術差異與取代可能性"},

inp:{title:"InP 磷化銦",
tags:[{t:"化合物半導體",c:"global"},{t:"高速雷射",c:"global"}],
what:"InP（磷化銦）具備直接帶隙特性，是製作高速雷射（EML、DFB）的最佳材料，廣泛用於長距離光纖通訊與高速光模組。相較矽光子，InP 光源效率更高，但製程獨立、成本較高，難以與 CMOS 整合。",
players:[
{name:"II-VI / Coherent",tag:"global",desc:"全球最大 InP 晶圓與光元件廠，供應 EML 雷射給各大光模組廠。"},
{name:"Lumentum",tag:"global",desc:"InP 雷射模組大廠，供應 400G/800G 高速光模組的光源。"},
{name:"聯亞 (3081)",tag:"tw",desc:"台灣最重要的 InP/GaAs 化合物半導體廠，EML 雷射晶粒供應商，為台股直接標的。"},
{name:"全新 (2455)",tag:"tw",desc:"化合物半導體磊晶廠，InP 相關磊晶片供應。"},
],
tw:"聯亞（3081）為台股 InP 最純粹標的；全新（2455）磊晶受益。800G/1.6T 光模組普及帶動 InP 雷射需求長期成長。",
ask:"聯亞在 InP 高速雷射的競爭地位"},

// ── 電源/散熱 ──────────────────────────────────────────────
liquid_cool:{title:"液冷散熱",
tags:[{t:"AI伺服器",c:"global"},{t:"散熱",c:"global"}],
what:"AI GPU 功耗突破 700W（B200 達 1000W），傳統氣冷無法應對，液冷成為必要技術。主要形式：直接液冷（DLC，冷水板貼附 CPU/GPU）、浸沒式冷卻（整台伺服器泡在電子氟化液中）。預計 2025-2027 年在 AI 資料中心液冷滲透率突破 30%。",
players:[
{name:"Vertiv（美）",tag:"global",desc:"全球資料中心熱管理與電源龍頭，液冷 CDU 市佔高。"},
{name:"CoolIT / Asetek",tag:"global",desc:"DLC 冷板技術領先，供應超算中心。"},
{name:"雙鴻 (3324)",tag:"tw",desc:"液冷散熱方案廠商，CDU 冷卻分配單元，為台股液冷最純粹標的。"},
{name:"奇鋐 (3017)",tag:"tw",desc:"均溫板 VC 與熱管，AI 伺服器散熱受益，也布局液冷。"},
{name:"建準 (2421)",tag:"tw",desc:"散熱風扇與液冷泵，AI 伺服器散熱零件供應。"},
],
tw:"液冷台股：雙鴻（3324，CDU）、奇鋐（3017，VC/熱管）、台灣日立（真空泵）、建準（2421，泵/風扇）。散熱板：超眾（6230）。",
ask:"台灣液冷散熱廠商的競爭實力比較"},

bbu:{title:"BBU / 資料中心電源",

let openSet=new Set(["semi","mem","hbm","opt","ai","robot","energy","pkg","adpkg"]);
let activeEl=null;

function showPanel(key){
  const info=INFO[key];
  const p=document.getElementById("panel");
  const emp=document.getElementById("panel-empty");
  if(!info){p.style.display="none";emp.style.display="flex";return;}
  emp.style.display="none";
  p.style.display="block";
  const tagHtml=(info.tags||[]).map(t=>`<span class="ptag ${t.c}">${t.t}</span>`).join("");
  const playersHtml=(info.players||[]).map(pl=>`
    <div class="pcard">
      <div class="pname">${pl.name} <span class="ptag ${pl.tag}" style="font-size:10px;padding:0 5px;">${pl.tag==="tw"?"台灣":pl.tag==="cn"?"中國":"全球"}</span></div>
      <div class="pdesc">${pl.desc}</div>
    </div>`).join("");
  p.innerHTML=`
    <div class="phead">${info.title}</div>
    <div class="section"><div>${tagHtml}</div></div>
    <div class="section">
      <div class="slabel">是什麼</div>
      <div class="body">${info.what}</div>
    </div>
    <div class="section">
      <div class="slabel">主要玩家與技術差異</div>
      ${playersHtml}
    </div>
    <div class="section">
      <div class="slabel">台股相關標的</div>
      <div class="body">${info.tw}</div>
    </div>
    <button class="ask-btn" onclick="sendPrompt('${info.ask}')">深入研究：${info.ask} ↗</button>
  `;
}

function build(nodes,depth){
  const ul=document.createElement("ul");
  ul.className="tree";
  nodes.forEach(n=>{
    const li=document.createElement("li");
    li.className="d"+Math.min(depth,4);
    if(n.infoKey) li.classList.add("has-info");
    const row=document.createElement("div");
    row.className="nr";
    const ar=document.createElement("span");
    const hasChildren=n.children&&n.children.length>0;
    ar.className="ar"+(hasChildren?"":"lf");
    if(hasChildren&&openSet.has(n.id)) ar.classList.add("open");
    ar.textContent="▶";
    const chip=document.createElement("span");
    chip.className="chip";
    chip.dataset.label=n.label;
    chip.textContent=n.label;
    row.appendChild(ar);row.appendChild(chip);
    li.appendChild(row);
    if(hasChildren){
      const sub=build(n.children,depth+1);
      if(!openSet.has(n.id)) sub.classList.add("hidden");
      li.appendChild(sub);
      ar.addEventListener("click",e=>{e.stopPropagation();const o=!sub.classList.contains("hidden");sub.classList.toggle("hidden",o);ar.classList.toggle("open",!o);if(!o)openSet.add(n.id);else openSet.delete(n.id);});
    }
    if(n.infoKey){
      chip.addEventListener("click",e=>{
        e.stopPropagation();
        if(activeEl) activeEl.classList.remove("active");
        row.classList.add("active");activeEl=row;
        showPanel(n.infoKey);
      });
    }
    ul.appendChild(li);
  });
  return ul;
}

function doSearch(q){
  q=q.trim().toLowerCase();
  document.querySelectorAll(".chip").forEach(c=>{
    const txt=c.dataset.label||"";
    if(q&&txt.toLowerCase().includes(q)){
      const i=txt.toLowerCase().indexOf(q);
      c.innerHTML=txt.slice(0,i)+'<mark class="hl">'+txt.slice(i,i+q.length)+"</mark>"+txt.slice(i+q.length);
      let el=c.closest("ul.tree");
      while(el){el.classList.remove("hidden");const pr=el.previousElementSibling;if(pr){const a=pr.querySelector(".ar");if(a)a.classList.add("open");}el=el.parentElement?.closest("ul.tree");}
    } else {
      c.textContent=txt;
    }
  });
}

const root=document.getElementById("tree");
DATA.forEach(n=>{
  const li=document.createElement("li");
  li.className="d0"+(n.infoKey?" has-info":"");
  const row=document.createElement("div");row.className="nr";
  const ar=document.createElement("span");
  const hasC=n.children&&n.children.length>0;
  ar.className="ar"+(hasC?"":"lf");
  if(hasC&&openSet.has(n.id)) ar.classList.add("open");
  ar.textContent="▶";
  const chip=document.createElement("span");
  chip.className="chip";chip.dataset.label=n.label;chip.textContent=n.label;
  if(n.infoKey){chip.style.cursor="pointer";chip.style.textDecoration="underline dotted";}
  row.appendChild(ar);row.appendChild(chip);li.appendChild(row);
  if(hasC){
    const sub=build(n.children,1);
    if(!openSet.has(n.id)) sub.classList.add("hidden");
    li.appendChild(sub);
    ar.addEventListener("click",e=>{e.stopPropagation();const o=!sub.classList.contains("hidden");sub.classList.toggle("hidden",o);ar.classList.toggle("open",!o);if(!o)openSet.add(n.id);else openSet.delete(n.id);});
  }
  if(n.infoKey){chip.addEventListener("click",e=>{e.stopPropagation();if(activeEl)activeEl.classList.remove("active");row.classList.add("active");activeEl=row;showPanel(n.infoKey);});}
  root.appendChild(li);
});
